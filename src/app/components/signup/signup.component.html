<div class="signup-container">
  <div class="signup-card">
    <h2>Sign Up</h2>
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="Enter your name"
          required
        />
        <div class="error-message" *ngIf="nameControl?.touched && nameControl?.invalid">
          Name is required
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          required
        />
        <div class="error-message" *ngIf="emailControl?.touched && emailControl?.invalid">
          Please enter a valid email
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          required
        />
        <div class="error-message" *ngIf="passwordControl?.touched && passwordControl?.invalid">
          Password must be at least 6 characters
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-large"
        [disabled]="signupForm.invalid"
        [class.loading]="isLoading"
      >
        {{ isLoading ? 'Loading...' : 'Sign Up' }}
      </button>

      <div class="login-link">
        Already have an account? <a routerLink="/login">Login</a>
      </div>
    </form>
  </div>
</div>
